<div class="flex md:hidden left-5 top-5 fixed z-10 text-white bg-black">
  <mat-icon
    class="cursor-pointer w-fit menu-icon text-4xl"
    fontIcon="menu"
    (click)="toggleMenu()"
  ></mat-icon>
</div>
<!-- <div
  [class.show]="isShowMenu()"
  class="nav-bar text-white h-15 p-4 bg-black w-full items-center justify-center hidden md:flex flex-wrap md:flex-nowrap"
> -->
<div class="nav-bar">
  <div
    class="hidden md:block nav-logo w-1/5 cursor-pointer"
    (click)="logoClick()"
  >
    <img src="https://themewagon.github.io/gymlife/img/logo.png" />
  </div>
  <div class="nav-menu" [class.show]="isShowMenu()">
    <div class="text-left w-full flex justify-end md:hidden">
      <mat-icon
        class="hover:text-orange-500 cursor-pointer"
        fontIcon="close"
        (click)="toggleMenu()"
      ></mat-icon>
    </div>
    @for (item of navigationMenus; track item.name) {
      <a
        class="grow w-full md:w-1/5 menu-item"
        [routerLink]="item.url"
        routerLinkActive="active"
        >{{ item.name }}</a
      >
    }
  </div>
  <div class="nav-social hidden md:flex gap-3 w-full md:w-1/5 justify-center">
    <mat-icon
      class="hover:text-orange-500 cursor-pointer"
      fontIcon="search"
    ></mat-icon>
    <a routerLink="/shopping_cart">
      <div class="relative">
        @if (store.itemCount() > 0) {
          <div
            class="rounded-full h-5 w-5 text-white absolute bg-orange-500 bottom-4 text-center left-3"
          >
            {{ store.itemCount() }}
          </div>
        }

        <mat-icon
          class="size-6 hover:text-orange-500 cursor-pointer"
          fontIcon="shopping_cart"
        ></mat-icon>
      </div>
    </a>
    @if (authenticationStore.isSignedIn()) {
      <mat-icon
        class="size-6 hover:text-orange-500 cursor-pointer"
        fontIcon="person"
        (click)="goToPersonal()"
      ></mat-icon>
    } @else {
      <mat-icon
        class="size-6 hover:text-orange-500 cursor-pointer"
        fontIcon="login"
        (click)="goToLogin()"
      ></mat-icon>
    }
  </div>
</div>
