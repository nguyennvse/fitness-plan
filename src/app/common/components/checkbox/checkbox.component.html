<div class="w-full">
  <p>{{ formConfig().title }}</p>
  <div [class]="formConfig().class">
    @for (value of valueList(); track $index) {
      <mat-checkbox
        class="ml-1 w-full"
        (change)="checkboxChange($event, value)"
      >
        {{ value }}
      </mat-checkbox>
    }
  </div>
</div>
