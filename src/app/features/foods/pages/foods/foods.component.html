<div class="w-full m-auto flex md:flex-wrap flex-nowrap">
  <div class="w-1/5 border-r border-r-gray-200 p-4">
    @for (item of filters; track $index) {
      <!-- <h3 class="border-b border-b-gray-300 p-2">{{ item.title }}</h3> -->
      <form [formGroup]="foodFilterGroup">
        @if (item.checkboxOptions) {
          <app-checkbox
            [formConfig]="item"
            [valueList]="item.checkboxOptions || []"
            [formControlName]="item.control"
          ></app-checkbox>
        } @else {
          <h3 class="border-b border-b-gray-300 p-2">{{ item.title }}</h3>
          <div class="w-full">
            <app-slider
              [formConfig]="item"
              [formControlName]="item.control"
            ></app-slider>
          </div>
        }
      </form>
    }
  </div>
  <div class="w-4/5 flex flex-wrap">
    <div
      class="p-2 w-full h-24 border-b-gray-200 border-b flex justify-left items-center relative"
    >
      <input
        name="search"
        class="w-3/5 border-gray-400 rounded-full border h-8 pl-11"
        type="text"
        [formControl]="searchControl"
      />
      <mat-icon
        class="size-6 hover:text-orange-500 cursor-pointer absolute left-5"
        fontIcon="search"
      ></mat-icon>
    </div>
    <div
      class="h-full max-h-full food-container flex flex-wrap"
      appInfiniteScroll
      (srollToBottom)="onSrollToBottom()"
    >
      @for (food of foods(); track food.id) {
        <div class="w-full md:w-1/2 lg:w-1/3">
          <app-food-card [foodInfo]="food"></app-food-card>
        </div>
      }
      @if (this.isShowLoadingScroll()) {
        <p class="w-full text-xl text-black text-center h-16">
          Loading more ...
        </p>
      }
    </div>
  </div>
</div>
