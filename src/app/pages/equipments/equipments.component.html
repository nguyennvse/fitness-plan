<div class="w-full flex flex-nowrap">
  <div class="w-1/5 border-r border-r-gray-300 p-4">
    @for (item of filterGroupConfig; track item.title) {
      <!-- <h3 class="border-b border-b-gray-300 p-2">{{ item.title }}</h3> -->
      <form [formGroup]="filterGroup">
        @if (item.checkboxOptions) {
          <app-checkbox
            [formConfig]="item"
            [valueList]="item.checkboxOptions || []"
            [formControlName]="item.control"
          ></app-checkbox>
        } @else {
          <h3 class="border-b border-b-gray-300 p-2">{{ item.title }}</h3>
          <div class="w-full">
            <app-slider
              [formConfig]="item"
              [formControlName]="item.control"
            ></app-slider>
          </div>
        }
      </form>
    }
  </div>
  <div class="w-4/5">
    <div
      class="p-2 w-full h-24 border-b-gray-200 border-b flex justify-left items-center relative"
    >
      <input
        name="search"
        class="w-3/5 border-gray-400 rounded-full border h-8 pl-11"
        type="text"
        [formControl]="searchControl"
      />
      <mat-icon
        class="size-6 hover:text-orange-500 cursor-pointer absolute left-5"
        fontIcon="search"
      ></mat-icon>
    </div>
    <div
      class="w-full h-full max-h-full equipment-container flex flex-wrap"
      appInfiniteScroll
    >
      @for (e of equipments(); track $index) {
        <app-equipment-card
          [name]="e.name"
          [price]="e.price"
          [imageUrl]="e.image_url"
          [description]="e.description"
        ></app-equipment-card>
      }
      @if (this.isShowLoadingScroll()) {
        <p class="w-full text-xl text-black text-center h-16">
          Loading more ...
        </p>
      }
    </div>
  </div>
</div>
