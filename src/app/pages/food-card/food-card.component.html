<div class="flex p-5 gap-10 w-full">
  <div class="rounded-xl border bg-white p-4 shadow-sm w-full">
    <div class="h-1/2 w-full flex-shrink-0 rounded-lg bg-gray-200">
      <img
        width="430"
        height="240"
        [src]="foodInfo()?.image ?? imageUrl()"
        class="card-img"
      />
    </div>

    <div class="flex-1 mt-3">
      <h3 class="text-2xl font-semibold text-center">{{ foodInfo()?.name }}</h3>
      <p class="text-xl text-gray-500 text-center">
        {{ foodInfo()?.portion }} · {{ foodInfo()?.calories }} kcal
      </p>

      <div class="mt-2 gap-4 text-xl">
        <div class="flex flex-nowrap">
          <div class="w-3/5">🥩 Protein:</div>
          <div class="w-2/5 text-center">{{ foodInfo()?.protein }}</div>
        </div>
        <div class="flex flex-nowrap">
          <div class="w-3/5">🍚 Carb :</div>
          <div class="w-2/5 text-center">{{ foodInfo()?.carb }}</div>
        </div>
        <div class="flex flex-nowrap">
          <div class="w-3/5">🧈 Fat:</div>
          <div class="w-2/5 text-center">{{ foodInfo()?.fat }}</div>
        </div>
      </div>

      <div class="mt-2 flex gap-2">
        <span
          class="rounded-full bg-green-100 px-2 py-0.5 text-xs text-green-700"
        >
          {{ foodInfo()?.meal }}
        </span>
        <span
          class="rounded-full bg-blue-100 px-2 py-0.5 text-xs text-blue-700"
        >
          {{ foodInfo()?.tags }}
        </span>
      </div>

      <div class="w-full flex gap-2 mt-3">
        <button
          class="w-1/2 h-9 border rounded-full text-white bg-green-500 p-1"
        >
          ADD
        </button>
        <button class="w-1/2 h-9 border rounded-full text-white bg-black p-1">
          DETAIL
        </button>
      </div>
    </div>
  </div>
</div>
