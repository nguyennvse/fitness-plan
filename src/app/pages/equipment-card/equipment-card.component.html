<div class="p-5 gap-10 border border-gray-500 rounded-md">
  <div class="flex gap-5">
    <div class="h-[200px] w-[200px]">
      <img height="200" width="200" [src]="imageUrl()" />
    </div>
    <div>
      <p>Name: {{ name() }}</p>
      <p>description: {{ description() }}</p>
      <p>Price: {{ price() }}</p>
    </div>
  </div>

  <div class="text-center w-full">
    <button
      (click)="addToCart()"
      class="mt-3 w-[100px] h-12 text-orange-500 rounded-full border border-orange-500 hover:bg-orange-500 hover:text-white transition-colors duration-300"
    >
      Add to cart
    </button>
  </div>
</div>
